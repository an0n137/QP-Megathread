name: Update Last Updated Timestamp

on:
  push:
    branches: [main]

jobs:
  timestamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write timestamp
        run: |
          mkdir -p assets/data
          echo "{\"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > assets/data/last-updated.json

      - name: Commit timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/last-updated.json
          git diff --staged --quiet || git commit -m "chore: update timestamp [skip ci]"
          git push
